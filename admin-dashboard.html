<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="div_auto_1" class="header">Admin Dashboard</div>

<!-- DASHBOARD -->
<div id="dashboardView" style="display:none">
  <div class="dashboard">
    <div class="box">Income<br><span id="income">₱0</span></div>
    <div class="box">Sales<br><span id="salesCount">0</span></div>
  </div>

  <div style="height:300px">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- INVENTORY -->
<div id="inventoryView">
  <div class="card" id="adminForm">
    <input id="name" placeholder="Name">
    <input id="price" type="number" placeholder="Price">
    <input id="qty" type="number" placeholder="Qty">
    <input id="expiry" type="date">
    <input type="file" id="imageInput">
    <button id="btn_1" onclick="addProduct()">Add Product</button>
  </div>

  <div id="productList"></div>
</div>

<!-- SALES -->
<div id="salesView" style="display:none">
  <div id="salesList"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div onclick="switchTab('inventory', this)" class="active">Inventory</div>
  <div onclick="switchTab('sales', this)">Sales</div>
  <div onclick="switchTab('dashboard', this)">Chart</div>
  <div onclick="logout()">Logout</div>
</div>

<script src="app.js"></script>
<script src="storage.js"></script>
<script src="inventory.js"></script>
<script src="sales.js"></script>

<script>

let chartInstance;

switchTab("inventory", document.querySelector(".tabs div"));

function drawChart(){

  let sales = getSales();
  let map = {};
  let total = 0;

  sales.forEach(s=>{
    total += s.total;
    map[s.date] = (map[s.date] || 0) + s.total;
  });

  document.getElementById("income").innerText = "₱" + total;
  document.getElementById("salesCount").innerText = sales.length;

  let canvas = document.getElementById("chart");
  if(!canvas) return;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(canvas, {
    type: "bar",
    data: {
      labels: Object.keys(map),
      datasets: [{
        label: "Sales",
        data: Object.values(map),
        backgroundColor: "#2d6cdf"
      }]
    }
  });
}

if(getRole && getRole() === "staff"){
  let form = document.getElementById("adminForm");
  if(form) form.style.display = "none";
}

loadProducts();
loadSales();
drawChart();

</script>

</body>
</html>
